name: Update Stats

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats SVG
        uses: cicirello/user-statistician@v1
        with:
          colors: dark
          fail-on-error: false
          image-width: 720
          border-radius: 10
          small-title: true
          max-languages: 6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
