name: Update Recon Card

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate recon SVG
        run: python3 scripts/generate_recon_card.py

      - name: Commit recon SVG
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: daily recon'
          file_pattern: assets/recon.svg
